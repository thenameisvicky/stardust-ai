name: Publish

on:
  workflow_dispatch:
    inputs:
      email:
        description: "Enter deployment email"
        required: true
        type: string

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: read

    steps:
      - name: Verify email from input
        id: verify-email
        run: |
          INPUT_EMAIL="${{ github.event.inputs.email }}"
          AUTHORIZED_EMAIL="${{ secrets.DEPLOYMENT_EMAIL }}"

          echo "Input email: $INPUT_EMAIL"
          echo "Authorized email from secrets: $AUTHORIZED_EMAIL"

          if [ -z "$AUTHORIZED_EMAIL" ]; then
            echo "DEPLOYMENT_EMAIL secret is not set in repository secrets."
            exit 1
          fi

          if [ "$INPUT_EMAIL" = "$AUTHORIZED_EMAIL" ]; then
            echo "Email verification passed"
            echo "verified=true" >> $GITHUB_OUTPUT
          else
            echo "Email verification failed. Input email does not match authorized email."
            exit 1
          fi

  build:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push binary
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/relayai:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deployment summary
        run: |
          echo "## Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
